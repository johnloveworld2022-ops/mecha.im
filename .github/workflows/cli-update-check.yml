name: Check for CLI updates

on:
  schedule:
    - cron: "0 8 * * *" # daily at 8am UTC
  workflow_dispatch:

concurrency:
  group: cli-update-check
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mecha.im

jobs:
  check-and-rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check latest package versions
        id: check
        run: |
          set -e
          CLAUDE_CLI=$(npm view @anthropic-ai/claude-code version)
          CLAUDE_SDK_JS=$(npm view @anthropic-ai/claude-agent-sdk version)
          CODEX=$(npm view @openai/codex version)
          GEMINI=$(npm view @google/gemini-cli version)
          CLAUDE_SDK_PY=$(pip index versions claude-agent-sdk 2>/dev/null | head -1 | grep -oP '\(\K[^)]+' || echo "unknown")
          echo "claude_cli=$CLAUDE_CLI" >> "$GITHUB_OUTPUT"
          echo "claude_sdk_js=$CLAUDE_SDK_JS" >> "$GITHUB_OUTPUT"
          echo "codex=$CODEX" >> "$GITHUB_OUTPUT"
          echo "gemini=$GEMINI" >> "$GITHUB_OUTPUT"
          echo "claude_sdk_py=$CLAUDE_SDK_PY" >> "$GITHUB_OUTPUT"

      - name: Check versions in current image
        id: current
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        run: |
          docker pull "$IMAGE" 2>/dev/null || {
            for k in claude_cli claude_sdk_js codex gemini claude_sdk_py; do echo "${k}_cur=none" >> "$GITHUB_OUTPUT"; done
            exit 0
          }
          CLAUDE_CLI_CUR=$(docker run --rm --entrypoint sh "$IMAGE" -c 'node -e "try{console.log(require(require.resolve(\"@anthropic-ai/claude-code/package.json\")).version)}catch{console.log(\"unknown\")}"' 2>/dev/null || echo "unknown")
          CLAUDE_SDK_JS_CUR=$(docker run --rm --entrypoint sh "$IMAGE" -c 'node -e "try{console.log(require(require.resolve(\"@anthropic-ai/claude-agent-sdk/package.json\")).version)}catch{console.log(\"unknown\")}"' 2>/dev/null || echo "unknown")
          CODEX_CUR=$(docker run --rm --entrypoint sh "$IMAGE" -c 'node -e "try{console.log(require(require.resolve(\"@openai/codex/package.json\")).version)}catch{console.log(\"unknown\")}"' 2>/dev/null || echo "unknown")
          GEMINI_CUR=$(docker run --rm --entrypoint sh "$IMAGE" -c 'node -e "try{console.log(require(require.resolve(\"@google/gemini-cli/package.json\")).version)}catch{console.log(\"unknown\")}"' 2>/dev/null || echo "unknown")
          CLAUDE_SDK_PY_CUR=$(docker run --rm --entrypoint sh "$IMAGE" -c 'python3 -c "import claude_agent_sdk;print(claude_agent_sdk.__version__)" 2>/dev/null || echo unknown' 2>/dev/null || echo "unknown")
          echo "claude_cli_cur=$CLAUDE_CLI_CUR" >> "$GITHUB_OUTPUT"
          echo "claude_sdk_js_cur=$CLAUDE_SDK_JS_CUR" >> "$GITHUB_OUTPUT"
          echo "codex_cur=$CODEX_CUR" >> "$GITHUB_OUTPUT"
          echo "gemini_cur=$GEMINI_CUR" >> "$GITHUB_OUTPUT"
          echo "claude_sdk_py_cur=$CLAUDE_SDK_PY_CUR" >> "$GITHUB_OUTPUT"

      - name: Determine if rebuild needed
        id: decide
        env:
          CLAUDE_CLI_LATEST: ${{ steps.check.outputs.claude_cli }}
          CLAUDE_SDK_JS_LATEST: ${{ steps.check.outputs.claude_sdk_js }}
          CODEX_LATEST: ${{ steps.check.outputs.codex }}
          GEMINI_LATEST: ${{ steps.check.outputs.gemini }}
          CLAUDE_SDK_PY_LATEST: ${{ steps.check.outputs.claude_sdk_py }}
          CLAUDE_CLI_CUR: ${{ steps.current.outputs.claude_cli_cur }}
          CLAUDE_SDK_JS_CUR: ${{ steps.current.outputs.claude_sdk_js_cur }}
          CODEX_CUR: ${{ steps.current.outputs.codex_cur }}
          GEMINI_CUR: ${{ steps.current.outputs.gemini_cur }}
          CLAUDE_SDK_PY_CUR: ${{ steps.current.outputs.claude_sdk_py_cur }}
        run: |
          REBUILD=false
          for pair in "Claude_CLI:$CLAUDE_CLI_CUR:$CLAUDE_CLI_LATEST" \
                      "Claude_SDK_JS:$CLAUDE_SDK_JS_CUR:$CLAUDE_SDK_JS_LATEST" \
                      "Codex:$CODEX_CUR:$CODEX_LATEST" \
                      "Gemini:$GEMINI_CUR:$GEMINI_LATEST" \
                      "Claude_SDK_PY:$CLAUDE_SDK_PY_CUR:$CLAUDE_SDK_PY_LATEST"; do
            NAME="${pair%%:*}"; REST="${pair#*:}"; CUR="${REST%%:*}"; LATEST="${REST#*:}"
            if [ "$CUR" != "$LATEST" ]; then
              echo "$NAME update: $CUR → $LATEST"
              REBUILD=true
            fi
          done
          echo "rebuild=$REBUILD" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.decide.outputs.rebuild == 'true'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up QEMU (multi-arch)
        if: steps.decide.outputs.rebuild == 'true'
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        if: steps.decide.outputs.rebuild == 'true'
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to GitHub Container Registry
        if: steps.decide.outputs.rebuild == 'true'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild and push with latest CLIs
        if: steps.decide.outputs.rebuild == 'true'
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CACHEBUST_CLI=${{ steps.check.outputs.claude_cli }}-${{ steps.check.outputs.claude_sdk_js }}-${{ steps.check.outputs.codex }}-${{ steps.check.outputs.gemini }}-${{ steps.check.outputs.claude_sdk_py }}

      - name: Summary
        env:
          REBUILD: ${{ steps.decide.outputs.rebuild }}
          CLAUDE_CLI_CUR: ${{ steps.current.outputs.claude_cli_cur }}
          CLAUDE_CLI_LATEST: ${{ steps.check.outputs.claude_cli }}
          CLAUDE_SDK_JS_CUR: ${{ steps.current.outputs.claude_sdk_js_cur }}
          CLAUDE_SDK_JS_LATEST: ${{ steps.check.outputs.claude_sdk_js }}
          CODEX_CUR: ${{ steps.current.outputs.codex_cur }}
          CODEX_LATEST: ${{ steps.check.outputs.codex }}
          GEMINI_CUR: ${{ steps.current.outputs.gemini_cur }}
          GEMINI_LATEST: ${{ steps.check.outputs.gemini }}
          CLAUDE_SDK_PY_CUR: ${{ steps.current.outputs.claude_sdk_py_cur }}
          CLAUDE_SDK_PY_LATEST: ${{ steps.check.outputs.claude_sdk_py }}
        run: |
          if [ "$REBUILD" = "true" ]; then STATUS="Rebuilt"; else STATUS="Up to date"; fi
          echo "### CLI & SDK Update Check" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | Current | Latest | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|---------|--------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Claude Code CLI | $CLAUDE_CLI_CUR | $CLAUDE_CLI_LATEST | $STATUS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Claude Agent SDK (JS) | $CLAUDE_SDK_JS_CUR | $CLAUDE_SDK_JS_LATEST | $STATUS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Claude Agent SDK (Python) | $CLAUDE_SDK_PY_CUR | $CLAUDE_SDK_PY_LATEST | $STATUS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Codex CLI | $CODEX_CUR | $CODEX_LATEST | $STATUS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gemini CLI | $GEMINI_CUR | $GEMINI_LATEST | $STATUS |" >> "$GITHUB_STEP_SUMMARY"
