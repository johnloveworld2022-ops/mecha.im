name: Check for CLI updates

on:
  schedule:
    - cron: "0 8 * * *" # daily at 8am UTC
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mecha.im

jobs:
  check-and-rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check latest CLI versions
        id: check
        run: |
          CLAUDE_LATEST=$(npm view @anthropic-ai/claude-code version 2>/dev/null || echo "unknown")
          CODEX_LATEST=$(npm view @openai/codex version 2>/dev/null || echo "unknown")
          echo "claude_version=$CLAUDE_LATEST" >> "$GITHUB_OUTPUT"
          echo "codex_version=$CODEX_LATEST" >> "$GITHUB_OUTPUT"

      - name: Check versions in current image
        id: current
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        run: |
          docker pull "$IMAGE" 2>/dev/null || true
          CLAUDE_CURRENT=$(docker run --rm "$IMAGE" sh -c 'claude --version 2>/dev/null || echo unknown' 2>/dev/null || echo "unknown")
          CODEX_CURRENT=$(docker run --rm "$IMAGE" sh -c 'codex --version 2>/dev/null || echo unknown' 2>/dev/null || echo "unknown")
          echo "claude_current=$CLAUDE_CURRENT" >> "$GITHUB_OUTPUT"
          echo "codex_current=$CODEX_CURRENT" >> "$GITHUB_OUTPUT"

      - name: Determine if rebuild needed
        id: decide
        env:
          CLAUDE_LATEST: ${{ steps.check.outputs.claude_version }}
          CODEX_LATEST: ${{ steps.check.outputs.codex_version }}
          CLAUDE_CURRENT: ${{ steps.current.outputs.claude_current }}
          CODEX_CURRENT: ${{ steps.current.outputs.codex_current }}
        run: |
          REBUILD=false
          if [ "$CLAUDE_LATEST" != "unknown" ] && echo "$CLAUDE_CURRENT" | grep -qv "$CLAUDE_LATEST"; then
            echo "Claude Code update: $CLAUDE_CURRENT → $CLAUDE_LATEST"
            REBUILD=true
          fi
          if [ "$CODEX_LATEST" != "unknown" ] && echo "$CODEX_CURRENT" | grep -qv "$CODEX_LATEST"; then
            echo "Codex update: $CODEX_CURRENT → $CODEX_LATEST"
            REBUILD=true
          fi
          echo "rebuild=$REBUILD" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.decide.outputs.rebuild == 'true'
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        if: steps.decide.outputs.rebuild == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.decide.outputs.rebuild == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.decide.outputs.rebuild == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild and push with latest CLIs
        if: steps.decide.outputs.rebuild == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          no-cache: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        env:
          REBUILD: ${{ steps.decide.outputs.rebuild }}
          CLAUDE_CURRENT: ${{ steps.current.outputs.claude_current }}
          CLAUDE_LATEST: ${{ steps.check.outputs.claude_version }}
          CODEX_CURRENT: ${{ steps.current.outputs.codex_current }}
          CODEX_LATEST: ${{ steps.check.outputs.codex_version }}
        run: |
          echo "### CLI Update Check" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | Current | Latest | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|---------|--------|--------|" >> "$GITHUB_STEP_SUMMARY"
          if [ "$REBUILD" = "true" ]; then
            STATUS="Rebuilt"
          else
            STATUS="Up to date"
          fi
          echo "| Claude Code | $CLAUDE_CURRENT | $CLAUDE_LATEST | $STATUS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Codex | $CODEX_CURRENT | $CODEX_LATEST | $STATUS |" >> "$GITHUB_STEP_SUMMARY"
