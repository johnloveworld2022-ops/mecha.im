name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build + sign, no release)"
        type: boolean
        default: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: ./scripts/build-binaries.sh linux-x64
      - run: ./scripts/build-binaries.sh linux-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: mecha-linux-x64
          path: dist/bin/linux-x64/
      - uses: actions/upload-artifact@v4
        with:
          name: mecha-linux-arm64
          path: dist/bin/linux-arm64/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: ./scripts/build-binaries.sh darwin-arm64
      - run: ./scripts/build-binaries.sh darwin-x64

      # Import signing certificate
      - name: Install Apple certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)

          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH"

      # Sign both darwin binaries
      - name: Sign binaries
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for bin in dist/bin/darwin-arm64/mecha dist/bin/darwin-x64/mecha; do
            codesign --sign "Developer ID Application: HANDO K.K. ($APPLE_TEAM_ID)" --options runtime --timestamp --force "$bin"
            codesign --verify --verbose "$bin"
            echo "Signed: $bin"
          done

      # Notarize both darwin binaries
      - name: Notarize binaries
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        run: |
          for arch in darwin-arm64 darwin-x64; do
            echo "Notarizing $arch..."
            ditto -c -k --keepParent "dist/bin/$arch/mecha" "/tmp/mecha-$arch.zip"
            xcrun notarytool submit "/tmp/mecha-$arch.zip" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --wait
            echo "Notarized: $arch (stapling skipped — not supported for bare executables)"
          done

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db

      - uses: actions/upload-artifact@v4
        with:
          name: mecha-darwin-arm64
          path: dist/bin/darwin-arm64/
      - uses: actions/upload-artifact@v4
        with:
          name: mecha-darwin-x64
          path: dist/bin/darwin-x64/

  release:
    needs: [build-linux, build-macos]
    if: startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package archives
        run: |
          cd artifacts
          for dir in mecha-*/; do
            name="${dir%/}"
            tar -czf "${name}.tar.gz" -C "$dir" .
            echo "Packaged: ${name}.tar.gz"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/mecha-*.tar.gz

  update-homebrew:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Compute SHA256 hashes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          for platform in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            URL="https://github.com/xiaolai/mecha.im/releases/download/v${VERSION}/mecha-${platform}.tar.gz"
            SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
            VAR="SHA_$(echo "$platform" | tr '-' '_' | tr '[:lower:]' '[:upper:]')"
            echo "${VAR}=${SHA}" >> "$GITHUB_ENV"
            echo "${platform}: ${SHA}"
          done

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: xiaolai/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          cat > homebrew-tap/Formula/mecha.rb << 'RUBY'
          class Mecha < Formula
            desc "Run an army of Claude Code bots on your machines"
            homepage "https://mecha.im"
            version "VERSION_PLACEHOLDER"
            license "ISC"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/xiaolai/mecha.im/releases/download/v#{version}/mecha-darwin-arm64.tar.gz"
                sha256 "SHA_DARWIN_ARM64_PLACEHOLDER"
              else
                url "https://github.com/xiaolai/mecha.im/releases/download/v#{version}/mecha-darwin-x64.tar.gz"
                sha256 "SHA_DARWIN_X64_PLACEHOLDER"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/xiaolai/mecha.im/releases/download/v#{version}/mecha-linux-arm64.tar.gz"
                sha256 "SHA_LINUX_ARM64_PLACEHOLDER"
              else
                url "https://github.com/xiaolai/mecha.im/releases/download/v#{version}/mecha-linux-x64.tar.gz"
                sha256 "SHA_LINUX_X64_PLACEHOLDER"
              end
            end

            def install
              bin.install "mecha"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/mecha --version")
            end
          end
          RUBY

          # Replace placeholders with actual values
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/" homebrew-tap/Formula/mecha.rb
          sed -i "s/SHA_DARWIN_ARM64_PLACEHOLDER/$SHA_DARWIN_ARM64/" homebrew-tap/Formula/mecha.rb
          sed -i "s/SHA_DARWIN_X64_PLACEHOLDER/$SHA_DARWIN_X64/" homebrew-tap/Formula/mecha.rb
          sed -i "s/SHA_LINUX_ARM64_PLACEHOLDER/$SHA_LINUX_ARM64/" homebrew-tap/Formula/mecha.rb
          sed -i "s/SHA_LINUX_X64_PLACEHOLDER/$SHA_LINUX_X64/" homebrew-tap/Formula/mecha.rb

          # Fix indentation (heredoc adds leading spaces)
          sed -i 's/^          //' homebrew-tap/Formula/mecha.rb

      - name: Push formula update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mecha.rb
          git commit -m "mecha $VERSION"
          git push
