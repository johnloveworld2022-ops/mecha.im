<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MECHA ASCII Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  #stage {
    font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.25;
    white-space: pre;
    color: #00ff88;
    text-shadow: 0 0 6px rgba(0, 255, 136, 0.35);
  }
</style>
</head>
<body>
<div id="stage"></div>
<script>
// в”Җв”Җ User's exact art в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const LINES = [
  '                          в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ',
  '                          в”Ӯ  {LE}     {RE}  в”Ӯ',
  '                          в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ',
  '                    в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—',
  '                    в•‘       {T}       в•‘',
  '                    в•ҡв•җв•җв•җв•җв•җв•җв•җв•Өв•җв•җв•җв•җв•җв•җв•җв•Өв•җв•җв•җв•җв•җв•җв•җв•қ',
  '                        в”Ңв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”җ',
  '                       в•ұв”Ӯ   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ   в”Ӯв•І',
  '                      в•ұ в”Ӯ   в”Ӯ в•ӯв”Җв”Җв”Җв•® в”Ӯ   в”Ӯ в•І',
  '                     в•ұ  в”Ӯ   в”Ӯ в”Ӯ {E} в”Ӯ в”Ӯ   в”Ӯ  в•І',
  '              в•”в•җв•җв•җв•җв•җв•Ў   в”Ӯ   в”Ӯ в”Ӯ {L} в”Ӯ в”Ӯ   в”Ӯ   в•һв•җв•җв•җв•җв•җв•—',
  '              в•‘     в”Ӯ   в”Ӯ   в”Ӯ в•°в”Җв”Җв”Җв•Ҝ в”Ӯ   в”Ӯ   в”Ӯ     в•‘',
  '              в•‘  в”Ңв”Җв”Җв”Ө   в”Ӯ   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ   в”Ӯ   в”ңв”Җв”Җв”җ  в•‘',
  '              в•‘  в”Ӯв–“в–“в”Ӯ   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ   в”Ӯв–“в–“в”Ӯ  в•‘',
  '              в•‘  в”Ӯв–“в–“в”Ӯ  в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—  в”Ӯв–“в–“в”Ӯ  в•‘',
  '              в•‘  в”Ӯв–“в–“в”Ӯ  в•‘ в”Ңв”Җв”Җв”җ в•”в•җв•җв•җв•— в”Ңв”Җв”Җв”җ в•‘  в”Ӯв–“в–“в”Ӯ  в•‘',
  '              в•‘  в””в”¬в”Җв”ҳ  в•‘ в”Ӯв–’в–’в”Ӯ в•‘ {A} в•‘ в”Ӯв–’в–’в”Ӯ в•‘  в””в”Җв”¬в”ҳ  в•‘',
  '              в•ҡв•җв•җв•җв•Әв•җв•җв•җв•җв•‘ в”Ӯв–’в–’в”Ӯ в•‘ {B} в•‘ в”Ӯв–’в–’в”Ӯ в•‘в•җв•җв•җв•җв•Әв•җв•җв•җв•қ',
  '                 в•ұв•І    в•‘ в””в”Җв”Җв”ҳ в•ҡв•җв•җв•җв•қ в””в”Җв”Җв”ҳ в•‘   в•ұв•І',
  '                в•ұ  в•І   в•‘                 в•‘  в•ұ  в•І',
  '               в•ұ в–’в–’ в•І  в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•Өв•Өв•җв•җв•җв•җв•җв•җв•җв•қ в•ұ в–’в–’ в•І',
  '              в•ұ в–’в–’в–’в–’ в•І     в”Ңв”Җв”Җв”Җв”Җв”ҳв””в”Җв”Җв”Җв”Җв”җ   в•ұ в–’в–’в–’в–’ в•І',
  '             в–• в–’в–’в–’в–’в–’в–’ в–Ҹ    в”Ӯ  в•‘    в•‘  в”Ӯ  в–• в–’в–’в–’в–’в–’в–’ в–Ҹ',
  '             в–• в–’в–’в–’в–’в–’в–’ в–Ҹ    в”Ӯ  в•‘    в•‘  в”Ӯ  в–• в–’в–’в–’в–’в–’в–’ в–Ҹ',
  '              в•І в–’в–’в–’в–’ в•ұ     в”Ӯ  в•‘    в•‘  в”Ӯ   в•І в–’в–’в–’в–’ в•ұ',
  '               в•І в–’в–’ в•ұ      в”ңв”Җв”Җв•Ёв”Җв”Җв”Җв”Җв•Ёв”Җв”Җв”Ө    в•І в–’в–’ в•ұ',
  '                в•І  в•ұ       в”Ӯ в–“в–“в–“в–“в–“в–“в–“в–“ в”Ӯ     в•І  в•ұ',
  '                 в•Ів•ұ        в”Ӯ в–“в–“в–“в–“в–“в–“в–“в–“ в”Ӯ      в•Ів•ұ',
  '                           в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ',
];

// в”Җв”Җ Exhaust helpers в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const EX_PAD = '                           '; // 27 spaces to center under feet
const EX_ROWS = 6;

// Bottom exhaust: narrowing pyramid under the feet
function buildExhaust(frame) {
  const chars = ['в•ұв•І', 'в–“в–“', 'в–’в–’', 'в–‘в–‘', 'В·В·', '  '];
  const widths = [12, 10, 8, 6, 4, 2];
  const rows = [];
  for (let r = 0; r < EX_ROWS; r++) {
    const ci = (r + frame) % chars.length;
    const w = widths[r];
    const half = w / 2;
    const indent = EX_PAD + ' '.repeat(r);
    const pair = chars[ci];
    if (pair === '  ') {
      rows.push(indent + ' '.repeat(w));
    } else if (ci === 0) {
      rows.push(indent + 'в•ұ'.repeat(half) + 'в•І'.repeat(half));
    } else {
      rows.push(indent + pair[0].repeat(half) + pair[1 % pair.length].repeat(half));
    }
  }
  return rows;
}

// Exhaust line for unrevealed blank rows during launch
// Full-width scrolling flame effect
function buildExhaustLine(frame, rowIdx) {
  // All chars in the same row are identical вҶ’ scrolls bottom-to-top
  const chars = ['в–‘', 'в–’', 'в–“', 'в–Ҳ', 'в–“', 'в–’', 'в–‘', ' '];
  const LINE_W = 46;
  const ci = (rowIdx + frame) % chars.length;
  const ch = chars[ci];
  return ch.repeat(LINE_W);
}

// в”Җв”Җ State в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const TOTAL = LINES.length;
const BLANK = '                                              '; // blank line same width
const TITLE = 'M E C H A';
const stage = document.getElementById('stage');

let revealCount = 0, phase = 'launch';
let faceTick = 0, diamondTick = 0, headEyeTick = 0;
let titleIdx = 0, titleHold = 0, exhaustFrame = 0;

// Cycle block chars for arm/thruster exhaust animation
const BLOCK_CYCLE = ['в–‘', 'в–’', 'в–“', 'в–Ҳ'];

function animateBlocks(line, frame, row) {
  // Only animate в–’ (thrusters/legs), leave в–“ (upper arms/feet) static
  // Using row index makes the effect scroll bottom-to-top (upward)
  let result = '';
  for (let c = 0; c < line.length; c++) {
    const ch = line[c];
    if (ch === 'в–’') {
      const ci = (row + frame) % BLOCK_CYCLE.length;
      result += BLOCK_CYCLE[ci];
    } else {
      result += ch;
    }
  }
  return result;
}

function render() {
  const eye  = faceTick % 2 === 0 ? 'A' : '>';
  const lip  = faceTick % 2 === 0 ? 'I' : 'в–Ҳ';
  // Head eyes: open most of the time, blink briefly (1 tick out of 8)
  const headEyeOpen = headEyeTick % 8 !== 0;
  const hLE = headEyeOpen ? 'в—ү' : 'в”Җ';
  const hRE = headEyeOpen ? 'в—ү' : 'в”Җ';
  const dP = diamondTick % 4;
  const dTop = (dP === 1 || dP === 2) ? 'в—Ҷ' : ' ';
  const dBot = (dP === 2 || dP === 3) ? 'в—Ҷ' : ' ';
  let title = '';
  for (let i = 0; i < TITLE.length; i++) {
    title += (phase === 'idle' && i < titleIdx) ? TITLE[i] : ' ';
  }

  // Always render ALL 30 mecha lines (exhaust if not yet revealed)
  // This keeps total height fixed вҶ’ no jumping
  const out = [];
  for (let i = 0; i < TOTAL; i++) {
    if (i < TOTAL - revealCount) {
      // During launch: scrolling flame; after launch: blank
      out.push(phase === 'launch' ? buildExhaustLine(exhaustFrame, i) : BLANK);
    } else {
      let line = LINES[i]
          .replace('{T}', title)
          .replace('{E}', eye)
          .replace('{L}', lip)
          .replace('{A}', dTop)
          .replace('{B}', dBot)
          .replace('{LE}', hLE)
          .replace('{RE}', hRE);
      out.push(animateBlocks(line, exhaustFrame, i));
    }
  }

  // Always append 6 exhaust rows (fixed height)
  out.push(...buildExhaust(exhaustFrame));

  stage.textContent = out.join('\n');
}

// в”Җв”Җ Animation loop в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let tL = 0, tF = 0, tD = 0, tT = 0, tX = 0, tH = 0;

function loop(ts) {
  let dirty = false;

  if (phase === 'launch') {
    if (ts - tL > 70) {
      tL = ts;
      if (revealCount < TOTAL) { revealCount++; dirty = true; }
      else { phase = 'idle'; dirty = true; }
    }
  }

  if (ts - tF > 800)  { tF = ts; faceTick++;    dirty = true; }
  if (ts - tD > 500)  { tD = ts; diamondTick++; dirty = true; }
  if (ts - tX > 150)  { tX = ts; exhaustFrame++; dirty = true; }
  if (ts - tH > 400)  { tH = ts; headEyeTick++; dirty = true; }

  if (phase === 'idle' && ts - tT > 300) {
    tT = ts;
    if (titleIdx < TITLE.length) titleIdx++;
    else { titleHold++; if (titleHold > 8) { titleIdx = 0; titleHold = 0; } }
    dirty = true;
  }

  if (dirty) render();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
